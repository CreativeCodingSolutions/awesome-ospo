name: CI
on:
  push:
    branches:
      - main
  pull_request:

# Declare default permissions as read-only
permissions: read-all

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - run: npx awesome-lint
